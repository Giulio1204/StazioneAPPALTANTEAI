<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AppaltanteAI — Cervello Centrale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════════
   TOKEN DI DESIGN — v2 MVP
   ══════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F6F9; --surface:#FFFFFF; --surface-2:#FAFBFD; --surface-3:#F0F2F6; --sunken:#EEF1F6;
  --ink:#0F1729; --ink-2:#4A5670; --ink-3:#8B96AB; --ink-4:#C2C9D6;
  --line:#E3E7EF; --line-2:#EBEEF3; --line-strong:#D3D9E4;
  --brand:#1849D6; --brand-2:#123AAE; --brand-3:#0E2F8C; --brand-soft:#EAF0FE; --brand-soft-2:#DCE6FD;
  --ai:#7C4DDA; --ai-2:#6935C4; --ai-soft:#F3EEFD;
  --ok:#0B7A4B; --ok-soft:#E7F8EF; --ok-line:#BBEBD1;
  --warn:#A15C00; --warn-soft:#FFF4E1; --warn-line:#F5D89A;
  --crit:#B4231E; --crit-soft:#FDEDEC; --crit-line:#F5C4C1;
  --info:#0A6FA8; --info-soft:#E7F4FC;
  --radius-sm:6px; --radius:10px; --radius-lg:14px; --radius-xl:18px;
  --rail-w:76px; --tab-h:60px; --topbar-h:64px; --cervello-w:392px;
  --shadow-1:0 1px 2px rgba(15,23,41,.05), 0 1px 1px rgba(15,23,41,.03);
  --shadow-2:0 4px 14px rgba(15,23,41,.08), 0 1px 3px rgba(15,23,41,.06);
  --shadow-3:0 12px 32px rgba(15,23,41,.14), 0 2px 6px rgba(15,23,41,.06);
  --ease:cubic-bezier(.3,0,.15,1);
  --t-fast:.13s var(--ease); --t:.2s var(--ease); --t-slow:.32s var(--ease);
  --font-display:'Manrope',system-ui,sans-serif;
  --font-ui:'Inter',system-ui,-apple-system,sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,monospace;
}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--font-ui);background:var(--bg);color:var(--ink);min-height:100vh;font-size:13.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--ink-4);border-radius:20px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:var(--ink-3)}
::-webkit-scrollbar-track{background:transparent}
a{color:inherit}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:4px}
.ic{width:18px;height:18px;display:block;flex-shrink:0}
.mono{font-family:var(--font-mono)}
.app{display:flex;min-height:100vh}

/* ---- RAIL ---- */
.rail{width:var(--rail-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:16px 0 14px;position:fixed;inset:0 auto 0 0;z-index:210}
.rail-mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(155deg,var(--brand),var(--brand-3));display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:var(--shadow-2);margin-bottom:22px;flex-shrink:0}
.rail-mark .ic{width:21px;height:21px}
.rail-nav{display:flex;flex-direction:column;gap:4px;align-items:center;flex:1;width:100%}
.rail-item{width:52px;height:52px;border-radius:var(--radius);display:flex;flex-direction:column;gap:3px;align-items:center;justify-content:center;color:var(--ink-3);border:1px solid transparent;transition:all var(--t-fast);position:relative;background:none}
.rail-item .ic{width:19px;height:19px}
.rail-item span{font-size:.55rem;font-weight:600;letter-spacing:.1px}
.rail-item:hover{background:var(--surface-3);color:var(--ink-2)}
.rail-item.active{background:var(--brand-soft);color:var(--brand)}
.rail-item.active::before{content:'';position:absolute;left:-16px;top:50%;transform:translateY(-50%);width:3px;height:22px;border-radius:0 3px 3px 0;background:var(--brand)}
.rail-dot{position:absolute;top:7px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--crit);border:1.5px solid var(--surface)}
.rail-foot{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}
.rail-ava{width:34px;height:34px;border-radius:9px;background:linear-gradient(155deg,var(--ai),var(--ai-2));color:#fff;font-weight:800;font-size:.68rem;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.25);cursor:pointer}

/* ---- MAIN / TOPBAR ---- */
.main{margin-left:var(--rail-w);flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0;transition:margin-right var(--t-slow)}
.main.shift{margin-right:var(--cervello-w)}
.topbar{height:var(--topbar-h);background:rgba(244,246,249,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 22px;position:sticky;top:0;z-index:120;flex-shrink:0}
.tb-title-wrap{min-width:0}
.tb-title{font-family:var(--font-display);font-size:1.05rem;font-weight:800;color:var(--ink);letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-sub{font-size:.7rem;color:var(--ink-3);margin-top:1px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-spacer{flex:1}
.tb-ask{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line-strong);border-radius:var(--radius);padding:8px 12px 8px 13px;cursor:pointer;transition:all var(--t-fast);width:308px;flex-shrink:0;color:var(--ink-3);box-shadow:var(--shadow-1)}
.tb-ask:hover{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.tb-ask .ic{width:15px;height:15px}
.tb-ask span{flex:1;font-size:.75rem;font-weight:500;text-align:left}
.tb-ask kbd{font-family:var(--font-mono);font-size:.6rem;color:var(--ink-3);background:var(--surface-3);border:1px solid var(--line);border-radius:4px;padding:1.5px 5px}
.tb-acts{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-btn{width:34px;height:34px;border-radius:var(--radius);border:1px solid var(--line);background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--ink-2);position:relative;transition:all var(--t-fast)}
.tb-btn:hover{border-color:var(--line-strong);background:var(--surface-3)}
.tb-btn .ic{width:17px;height:17px}
.tb-badge{position:absolute;top:-4px;right:-4px;background:var(--crit);color:#fff;font-size:.53rem;font-weight:800;border-radius:20px;padding:1px 4.5px;min-width:15px;text-align:center;line-height:1.5;border:1.5px solid var(--surface)}
.tb-badge.hide{display:none}
.tb-cervello-btn{display:flex;align-items:center;gap:7px;background:var(--ink);color:#fff;border:none;border-radius:var(--radius);padding:0 13px;height:34px;font-size:.74rem;font-weight:700;transition:all var(--t-fast);letter-spacing:-.1px}
.tb-cervello-btn:hover{background:var(--brand-3)}
.tb-cervello-btn.on{background:var(--brand)}
.cervello-pulse{width:6px;height:6px;border-radius:50%;background:#5FF0A8;box-shadow:0 0 0 0 rgba(95,240,168,.6);animation:pulse-ring 2s infinite}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(95,240,168,.55)}70%{box-shadow:0 0 0 6px rgba(95,240,168,0)}100%{box-shadow:0 0 0 0 rgba(95,240,168,0)}}

/* ---- NOTIFICHE (dropdown) ---- */
.notif-panel{position:fixed;top:calc(var(--topbar-h) + 6px);right:70px;width:360px;max-height:65vh;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);box-shadow:var(--shadow-3);z-index:260;display:none;flex-direction:column;overflow:hidden}
.notif-panel.open{display:flex}
.notif-head{padding:13px 16px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;justify-content:space-between}
.notif-title{font-size:.78rem;font-weight:800}
.notif-clear{font-size:.66rem;font-weight:700;color:var(--brand);background:none;border:none}
.notif-list{overflow-y:auto;padding:4px 0}
.notif-item{display:flex;gap:10px;padding:11px 16px;border-bottom:1px solid var(--line-2);cursor:pointer;transition:background var(--t-fast)}
.notif-item:hover{background:var(--surface-2)}
.notif-item:last-child{border:none}
.notif-item.unread{background:var(--brand-soft)}
.notif-item.unread:hover{background:var(--brand-soft-2)}
.notif-ic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notif-ic .ic{width:14px;height:14px}
.notif-txt{font-size:.72rem;color:var(--ink-2);line-height:1.45}
.notif-txt b{color:var(--ink);font-weight:700}
.notif-time{font-size:.6rem;color:var(--ink-3);margin-top:2px}
.notif-empty{padding:26px 16px;text-align:center;color:var(--ink-3);font-size:.73rem}

/* ---- ALERTLINE ---- */
.alertline{display:none;align-items:center;gap:10px;padding:8px 22px;background:var(--crit-soft);border-bottom:1px solid var(--crit-line);font-size:.73rem;color:var(--crit);font-weight:600;flex-shrink:0}
.alertline.show{display:flex}
.alertline .ic{width:15px;height:15px;flex-shrink:0}
.alertline b{font-weight:800}
.alertline-link{margin-left:auto;color:var(--crit);text-decoration:underline;font-weight:700;flex-shrink:0;background:none;border:none;font-size:.73rem}

.view{flex:1;padding:24px 28px 60px;max-width:1240px;width:100%}
.view-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.view-h1{font-family:var(--font-display);font-size:1.5rem;font-weight:800;letter-spacing:-.5px}
.view-p{color:var(--ink-3);font-size:.82rem;margin-top:3px;font-weight:500;max-width:560px}

/* ---- COMPONENTI ---- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);box-shadow:var(--shadow-1)}
.btn{display:inline-flex;align-items:center;gap:6px;border-radius:var(--radius-sm);border:1px solid var(--line-strong);background:var(--surface);color:var(--ink-2);font-size:.73rem;font-weight:700;padding:7px 12px;transition:all var(--t-fast)}
.btn:hover{border-color:var(--ink-4);background:var(--surface-3)}
.btn .ic{width:14px;height:14px}
.btn-primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn-primary:hover{background:var(--brand-2);border-color:var(--brand-2)}
.btn-ai{background:var(--ai-soft);border-color:#E1D3FA;color:var(--ai-2)}
.btn-ai:hover{background:#EBE0FB}
.btn-ghost{border-color:transparent;background:none}
.btn-ghost:hover{background:var(--surface-3)}
.btn-sm{padding:5px 9px;font-size:.68rem}
.btn-ok{background:var(--ok-soft);border-color:var(--ok-line);color:var(--ok)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:.63rem;font-weight:700;padding:3px 8px;border-radius:20px;border:1px solid transparent;white-space:nowrap;letter-spacing:.1px}
.chip-ok{background:var(--ok-soft);color:var(--ok);border-color:var(--ok-line)}
.chip-warn{background:var(--warn-soft);color:var(--warn);border-color:var(--warn-line)}
.chip-crit{background:var(--crit-soft);color:var(--crit);border-color:var(--crit-line)}
.chip-info{background:var(--info-soft);color:var(--info);border-color:#BFE1F3}
.chip-ai{background:var(--ai-soft);color:var(--ai-2);border-color:#E1D3FA}
.chip-neutral{background:var(--surface-3);color:var(--ink-2);border-color:var(--line)}
.chip-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.filterbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.fchip{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:600;padding:6px 12px;border-radius:20px;border:1px solid var(--line-strong);background:var(--surface);color:var(--ink-2);transition:all var(--t-fast)}
.fchip:hover{border-color:var(--ink-4)}
.fchip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.searchbox{display:flex;align-items:center;gap:8px;border:1px solid var(--line-strong);background:var(--surface);border-radius:20px;padding:6px 12px;flex:1;min-width:180px;max-width:280px}
.searchbox .ic{width:14px;height:14px;color:var(--ink-3)}
.searchbox input{border:none;outline:none;background:none;font-size:.75rem;flex:1;font-family:inherit;color:var(--ink)}
.searchbox input::placeholder{color:var(--ink-3)}
.gauge{display:flex;flex-direction:column;gap:4px}
.gauge-top{display:flex;justify-content:space-between;align-items:baseline}
.gauge-lbl{font-size:.62rem;color:var(--ink-3);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.gauge-val{font-size:.68rem;font-weight:800;color:var(--ink-2)}
.gauge-track{height:5px;border-radius:20px;background:var(--sunken);overflow:hidden}
.gauge-fill{height:100%;border-radius:20px;transition:width .7s var(--ease)}

/* ---- OGGI ---- */
.oggi-hero{background:linear-gradient(120deg,var(--ink) 0%,#1B2A55 60%,var(--brand-3) 130%);border-radius:var(--radius-xl);padding:24px 26px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden}
.oggi-hero::after{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 82% 20%,rgba(124,77,218,.35),transparent 55%);pointer-events:none}
.oggi-hero-top{display:flex;align-items:center;justify-content:space-between;gap:14px;position:relative;flex-wrap:wrap}
.oggi-greet{font-family:var(--font-display);font-size:1.32rem;font-weight:800;letter-spacing:-.4px}
.oggi-date{font-size:.73rem;color:rgba(255,255,255,.6);margin-top:3px;font-weight:500;text-transform:capitalize}
.oggi-stats{display:flex;gap:26px;margin-top:18px;position:relative;flex-wrap:wrap}
.oggi-stat b{font-family:var(--font-display);font-size:1.5rem;font-weight:800;display:block;line-height:1}
.oggi-stat span{font-size:.65rem;color:rgba(255,255,255,.55);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:5px;display:block}
.oggi-grid{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
.feed-group{margin-bottom:22px}
.feed-group:last-child{margin-bottom:0}
.feed-group-h{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.feed-group-h .ic{width:15px;height:15px;color:var(--ink-3)}
.feed-group-title{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-2)}
.feed-group-count{font-size:.64rem;color:var(--ink-3);font-weight:700;background:var(--surface-3);border-radius:20px;padding:1px 7px}
.feed-list{display:flex;flex-direction:column;gap:10px}
.fcard{padding:15px 16px;transition:box-shadow var(--t-fast),border-color var(--t-fast),opacity .3s,transform .3s}
.fcard:hover{box-shadow:var(--shadow-2);border-color:var(--line-strong)}
.fcard.resolving{opacity:0;transform:translateX(14px)}
.fcard.risolto{opacity:.62}
.fcard.risolto .fcard-title{text-decoration:line-through;text-decoration-color:var(--ink-4)}
.fcard-top{display:flex;align-items:flex-start;gap:11px}
.fcard-ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid transparent}
.fcard-ic .ic{width:16px;height:16px}
.fcard-body{flex:1;min-width:0}
.fcard-headline{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:2px}
.fcard-title{font-size:.83rem;font-weight:700;letter-spacing:-.1px}
.fcard-desc{font-size:.75rem;color:var(--ink-2);line-height:1.55}
.fcard-meta{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap}
.fcard-proj{font-size:.66rem;color:var(--brand);font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.fcard-proj:hover{text-decoration:underline}
.fcard-proj .ic{width:12px;height:12px}
.fcard-actions{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap}
.why-toggle{display:inline-flex;align-items:center;gap:4px;font-size:.66rem;font-weight:700;color:var(--ai-2);background:none;border:none;padding:0;margin-top:9px}
.why-toggle .ic{width:11px;height:11px;transition:transform var(--t-fast)}
.why-toggle.open .ic:last-child{transform:rotate(90deg)}
.why-body{display:none;margin-top:8px;padding:11px 12px;background:var(--ai-soft);border:1px solid #E1D3FA;border-radius:var(--radius-sm);font-size:.71rem;color:#3E2377;line-height:1.6}
.why-body.open{display:block}
.cite-chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:.61rem;font-weight:600;background:#fff;border:1px solid #E1D3FA;color:var(--ai-2);padding:2px 7px;border-radius:5px;margin-top:6px}
.cite-chip .ic{width:11px;height:11px}
.side-card{padding:16px}
.side-card + .side-card{margin-top:16px}
.side-card-h{display:flex;align-items:center;gap:7px;margin-bottom:12px}
.side-card-h .ic{width:14px;height:14px;color:var(--ink-3)}
.side-card-title{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-2)}
.mini-scad{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--line-2);cursor:pointer}
.mini-scad:last-child{border:none;padding-bottom:0}
.mini-scad-pill{font-family:var(--font-mono);font-size:.66rem;font-weight:800;border-radius:6px;padding:4px 6px;min-width:30px;text-align:center;flex-shrink:0}
.mini-scad-txt{font-size:.72rem;font-weight:600;line-height:1.35}
.mini-scad-sub{font-size:.63rem;color:var(--ink-3);margin-top:1px}
.agent-mini{display:flex;align-items:center;gap:9px;padding:7px 0;cursor:pointer;border-radius:6px}
.agent-mini:hover{background:var(--surface-2)}
.agent-mini-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.agent-mini-name{font-size:.72rem;font-weight:700;flex:1}
.agent-mini-n{font-size:.64rem;color:var(--ink-3);font-weight:700}
.live-feed{max-height:230px;overflow-y:auto}
.live-row{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--line-2);animation:live-in .35s var(--ease)}
.live-row:last-child{border:none}
@keyframes live-in{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.live-dot{width:6px;height:6px;border-radius:50%;margin-top:6px;flex-shrink:0}
.live-txt{font-size:.68rem;color:var(--ink-2);line-height:1.45;flex:1}
.live-txt b{color:var(--ink);font-weight:700}
.live-time{font-size:.58rem;color:var(--ink-3);flex-shrink:0;margin-top:2px}

/* ---- PROGETTI ---- */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.pcard{padding:17px 18px;cursor:pointer;transition:all var(--t-fast)}
.pcard:hover{box-shadow:var(--shadow-2);border-color:var(--line-strong);transform:translateY(-1px)}
.pcard-prog{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:2px 0}
.pcard-title{font-size:.87rem;font-weight:700;line-height:1.35;margin:4px 0 5px}
.pcard-cig{font-family:var(--font-mono);font-size:.65rem;color:var(--ink-3)}
.pcard-fase{margin:11px 0 13px}
.pcard-gauges{display:grid;grid-template-columns:1fr 1fr;gap:9px 14px;margin-bottom:12px}
.pcard-foot{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--line-2)}
.pcard-scad{font-size:.65rem;color:var(--ink-2);font-weight:600;display:flex;align-items:center;gap:5px}
.pcard-scad .ic{width:12px;height:12px;color:var(--ink-3)}
.pcard-rischio{display:flex;align-items:center;gap:5px}
.risk-dot{width:8px;height:8px;border-radius:50%}

/* ---- DETTAGLIO PROGETTO ---- */
.pd-back{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:700;color:var(--ink-3);background:none;border:none;margin-bottom:14px}
.pd-back:hover{color:var(--ink)}
.pd-back .ic{width:13px;height:13px;transform:rotate(180deg)}
.pd-head{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;flex-wrap:wrap;margin-bottom:20px}
.pd-title{font-family:var(--font-display);font-size:1.35rem;font-weight:800;letter-spacing:-.4px;max-width:560px}
.pd-meta{display:flex;gap:16px;flex-wrap:wrap;margin-top:9px}
.pd-meta-item{font-size:.72rem;color:var(--ink-2)}
.pd-meta-item b{color:var(--ink);font-weight:700}
.twin-row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:22px}
.twin-cell{padding:13px 14px}
.phase-rail{margin-bottom:24px;overflow-x:auto;padding-bottom:6px}
.phase-track{display:flex;align-items:flex-start;min-width:max-content;position:relative;padding:0 4px}
.phase-node{display:flex;flex-direction:column;align-items:center;width:104px;flex-shrink:0;position:relative;cursor:pointer}
.phase-line{position:absolute;top:15px;left:-52px;width:104px;height:2px;background:var(--line-strong);z-index:0}
.phase-node:first-child .phase-line{display:none}
.phase-line.done{background:var(--ok)}
.phase-dot{width:30px;height:30px;border-radius:50%;background:var(--surface);border:2px solid var(--line-strong);display:flex;align-items:center;justify-content:center;z-index:1;font-size:.68rem;font-weight:800;color:var(--ink-3)}
.phase-dot .ic{width:14px;height:14px}
.phase-node.done .phase-dot{background:var(--ok);border-color:var(--ok);color:#fff}
.phase-node.current .phase-dot{background:var(--brand);border-color:var(--brand);color:#fff;box-shadow:0 0 0 5px var(--brand-soft)}
.phase-lbl{font-size:.63rem;font-weight:700;color:var(--ink-3);text-align:center;margin-top:8px;line-height:1.3;padding:0 2px}
.phase-node.current .phase-lbl{color:var(--brand)}
.phase-node.done .phase-lbl{color:var(--ink-2)}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:18px;overflow-x:auto}
.tab-btn{padding:9px 4px;margin-right:20px;font-size:.75rem;font-weight:700;color:var(--ink-3);background:none;border:none;border-bottom:2px solid transparent;transition:all var(--t-fast);white-space:nowrap}
.tab-btn:hover{color:var(--ink-2)}
.tab-btn.active{color:var(--brand);border-bottom-color:var(--brand)}
.tabpanel{display:none}
.tabpanel.active{display:block}
.doc-row{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line-2)}
.doc-row:last-child{border:none}
.doc-ic{width:32px;height:32px;border-radius:8px;background:var(--surface-3);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--ink-3)}
.doc-ic .ic{width:15px;height:15px}
.doc-name{font-size:.76rem;font-weight:700}
.doc-sub{font-size:.64rem;color:var(--ink-3);margin-top:1px}
.doc-status{margin-left:auto;flex-shrink:0;display:flex;gap:7px;align-items:center}
.log-row{display:flex;gap:11px;padding:10px 0}
.log-dot{width:7px;height:7px;border-radius:50%;background:var(--ink-4);margin-top:6px;flex-shrink:0}
.log-txt{font-size:.75rem;color:var(--ink-2)}
.log-txt b{color:var(--ink);font-weight:700}
.log-time{font-size:.63rem;color:var(--ink-3);margin-top:2px}
.sal-table{width:100%;border-collapse:collapse;font-size:.74rem}
.sal-table th{text-align:left;font-size:.62rem;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-3);font-weight:800;padding:0 10px 8px;border-bottom:1px solid var(--line)}
.sal-table td{padding:11px 10px;border-bottom:1px solid var(--line-2);color:var(--ink-2)}
.sal-table td:first-child,.sal-table th:first-child{padding-left:0}
.sal-table b{color:var(--ink);font-weight:700}

/* ---- PROGRAMMI / KNOWLEDGE ---- */
.prog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.progcard{padding:18px;cursor:pointer;transition:all var(--t-fast)}
.progcard:hover{box-shadow:var(--shadow-2);border-color:var(--line-strong)}
.progcard-badge{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:.72rem;color:#fff;margin-bottom:12px}
.progcard-name{font-size:.9rem;font-weight:800}
.progcard-full{font-size:.68rem;color:var(--ink-3);margin-top:2px;line-height:1.4}
.progcard-stats{display:flex;gap:16px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line-2)}
.progcard-stat b{font-family:var(--font-display);font-size:1.05rem;font-weight:800;display:block}
.progcard-stat span{font-size:.6rem;color:var(--ink-3);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.pipeline{display:flex;align-items:center;gap:6px;margin-top:10px}
.pipeline-step{flex:1;height:4px;border-radius:20px;background:var(--sunken);transition:background .35s}
.pipeline-step.on{background:var(--ok)}
.pipeline-step.working{background:var(--warn);animation:blinkp 0.9s infinite}
@keyframes blinkp{50%{opacity:.35}}
.kdoc-row{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line-2)}
.kdoc-row:last-child{border:none}
.kdoc-ic{width:34px;height:34px;border-radius:8px;background:var(--ai-soft);color:var(--ai-2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kdoc-ic .ic{width:16px;height:16px}
.kdoc-name{font-size:.77rem;font-weight:700}
.kdoc-sub{font-size:.64rem;color:var(--ink-3);margin-top:2px}
.kdoc-pipeline{margin-left:auto;flex-shrink:0;width:170px}
.kdoc-pipeline-lbl{font-size:.6rem;color:var(--ink-3);margin-top:4px;text-align:right}
.dropzone{border:1.5px dashed var(--line-strong);border-radius:var(--radius-lg);background:var(--surface-2);padding:26px 20px;text-align:center;transition:all var(--t-fast);cursor:pointer;margin-bottom:16px}
.dropzone:hover,.dropzone.over{border-color:var(--ai);background:var(--ai-soft)}
.dropzone .ic{width:26px;height:26px;color:var(--ai-2);margin:0 auto 8px}
.dz-title{font-size:.8rem;font-weight:700}
.dz-sub{font-size:.68rem;color:var(--ink-3);margin-top:3px}
.rules-flash{display:inline-flex;align-items:center;gap:5px;font-size:.66rem;font-weight:800;color:var(--ok);animation:live-in .4s var(--ease)}

/* ---- AGENTI ---- */
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.agentcard{padding:18px;transition:box-shadow var(--t-fast)}
.agentcard:hover{box-shadow:var(--shadow-2)}
.agentcard-top{display:flex;gap:12px;align-items:flex-start}
.agentcard-ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.agentcard-ic .ic{width:18px;height:18px}
.agentcard-ic.running::after{content:'';position:absolute;inset:-3px;border-radius:12px;border:2px solid currentColor;opacity:.4;animation:pulse-run 1s infinite}
@keyframes pulse-run{0%{transform:scale(1);opacity:.45}100%{transform:scale(1.18);opacity:0}}
.agentcard-name{font-size:.85rem;font-weight:800;display:flex;align-items:center;gap:7px}
.agentcard-role{font-size:.71rem;color:var(--ink-3);margin-top:2px;line-height:1.4}
.agentcard-status-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);flex-shrink:0}
.agentcard-status-dot.busy{background:var(--warn);animation:blinkp 0.8s infinite}
.agentcard-stats{display:flex;gap:18px;margin:14px 0}
.agentcard-stat b{font-family:var(--font-display);font-size:1.15rem;font-weight:800;display:block;line-height:1}
.agentcard-stat span{font-size:.6rem;color:var(--ink-3);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.agentcard-log{border-top:1px solid var(--line-2);padding-top:10px;max-height:0;overflow:hidden;transition:max-height .3s var(--ease)}
.agentcard-log.open{max-height:280px;overflow-y:auto}
.agent-log-row{display:flex;gap:8px;padding:5px 0;font-size:.68rem;color:var(--ink-2);line-height:1.45}
.agent-log-time{font-family:var(--font-mono);font-size:.6rem;color:var(--ink-3);flex-shrink:0;margin-top:2px;width:38px}
.agentcard-foot{display:flex;gap:8px;margin-top:12px}

/* ---- CERVELLO ---- */
.cervello{position:fixed;top:0;right:0;bottom:0;width:var(--cervello-w);background:var(--surface);border-left:1px solid var(--line);display:flex;flex-direction:column;z-index:250;transform:translateX(100%);transition:transform var(--t-slow);box-shadow:-8px 0 32px rgba(15,23,41,.08)}
.cervello.open{transform:translateX(0)}
.cerv-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px;flex-shrink:0}
.cerv-mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(155deg,var(--ai),var(--ai-2));display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.cerv-mark .ic{width:17px;height:17px}
.cerv-title{font-family:var(--font-display);font-size:.9rem;font-weight:800}
.cerv-status{display:flex;align-items:center;gap:5px;font-size:.65rem;color:var(--ok);font-weight:700;margin-top:1px}
.cerv-close{margin-left:auto;width:28px;height:28px;border-radius:8px;border:none;background:none;color:var(--ink-3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cerv-close:hover{background:var(--surface-3);color:var(--ink)}
.cerv-close .ic{width:16px;height:16px}
.cerv-context{padding:10px 18px;border-bottom:1px solid var(--line-2);background:var(--surface-2);display:flex;align-items:center;gap:8px;flex-shrink:0}
.cerv-context .ic{width:13px;height:13px;color:var(--ink-3);flex-shrink:0}
.cerv-context-txt{font-size:.66rem;color:var(--ink-2);font-weight:600}
.cerv-context-txt b{color:var(--ink)}
.cerv-thread{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:16px}
.cmsg{display:flex;gap:10px;max-width:100%}
.cmsg-ai .cmsg-bubble{background:var(--surface-2);border:1px solid var(--line-2);border-radius:2px 12px 12px 12px}
.cmsg-user{flex-direction:row-reverse}
.cmsg-user .cmsg-bubble{background:var(--brand);color:#fff;border-radius:12px 2px 12px 12px}
.cmsg-ava{width:24px;height:24px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.cmsg-ava.ai{background:var(--ai-soft);color:var(--ai-2)}
.cmsg-ava.user{background:var(--ink);color:#fff;font-size:.55rem;font-weight:800}
.cmsg-ava .ic{width:13px;height:13px}
.cmsg-bubble{padding:10px 13px;font-size:.75rem;line-height:1.55}
.cmsg-bubble p+p{margin-top:8px}
.cmsg-cites{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.cmsg-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.cerv-suggest{padding:0 18px 12px;flex-shrink:0}
.cerv-suggest-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.cerv-sugg-btn{flex-shrink:0;font-size:.66rem;font-weight:600;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line);border-radius:20px;padding:6px 11px;white-space:nowrap}
.cerv-sugg-btn:hover{border-color:var(--ink-4);background:var(--surface-3)}
.cerv-input-wrap{padding:14px 18px 18px;border-top:1px solid var(--line);flex-shrink:0}
.cerv-input-box{display:flex;align-items:flex-end;gap:8px;background:var(--surface-2);border:1px solid var(--line-strong);border-radius:var(--radius);padding:8px 8px 8px 13px}
.cerv-input-box:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.cerv-input-box textarea{flex:1;border:none;outline:none;background:none;resize:none;font-family:inherit;font-size:.78rem;line-height:1.4;max-height:90px;color:var(--ink)}
.cerv-input-box textarea::placeholder{color:var(--ink-3)}
.cerv-send{width:30px;height:30px;border-radius:8px;background:var(--ink);color:#fff;border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--t-fast)}
.cerv-send:hover{background:var(--brand)}
.cerv-send .ic{width:14px;height:14px}
.cerv-typing{display:flex;gap:4px;padding:11px 13px}
.cerv-typing span{width:6px;height:6px;border-radius:50%;background:var(--ink-4);animation:typing 1.1s infinite}
.cerv-typing span:nth-child(2){animation-delay:.15s}
.cerv-typing span:nth-child(3){animation-delay:.3s}
@keyframes typing{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-2px)}}
.cervello-scrim{display:none;position:fixed;inset:0;background:rgba(15,23,41,.35);z-index:240;backdrop-filter:blur(1px)}
.cervello-scrim.show{display:block}

/* ---- MODALE ---- */
.modal-scrim{position:fixed;inset:0;background:rgba(15,23,41,.45);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.modal-scrim.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-xl);box-shadow:var(--shadow-3);width:100%;max-width:640px;max-height:88vh;display:flex;flex-direction:column;animation:modal-in .22s var(--ease)}
.modal.wide{max-width:780px}
@keyframes modal-in{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:10px;flex-shrink:0}
.modal-title{font-family:var(--font-display);font-size:.95rem;font-weight:800;flex:1}
.modal-x{width:28px;height:28px;border-radius:8px;border:none;background:none;color:var(--ink-3);display:flex;align-items:center;justify-content:center}
.modal-x:hover{background:var(--surface-3);color:var(--ink)}
.modal-x .ic{width:15px;height:15px}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-foot{padding:14px 20px;border-top:1px solid var(--line-2);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;flex-wrap:wrap}
.atto-paper{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;font-size:.76rem;line-height:1.7;color:var(--ink-2);white-space:pre-wrap;font-family:Georgia,'Times New Roman',serif;max-height:340px;overflow-y:auto}
.atto-paper h4{font-size:.82rem;color:var(--ink);text-align:center;margin-bottom:12px;font-family:inherit}
.diff-block{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.diff-lbl{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:7px 13px}
.diff-old .diff-lbl{background:var(--crit-soft);color:var(--crit)}
.diff-new .diff-lbl{background:var(--ok-soft);color:var(--ok)}
.diff-txt{padding:11px 13px;font-size:.74rem;line-height:1.6;color:var(--ink-2)}
.diff-old .diff-txt del{background:#FBDBD9;text-decoration:line-through;text-decoration-color:var(--crit);padding:0 2px;border-radius:3px}
.diff-new .diff-txt mark{background:#C9F2DC;padding:0 2px;border-radius:3px;color:var(--ink)}
.form-row{margin-bottom:14px}
.form-lbl{font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-2);display:block;margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;border:1px solid var(--line-strong);border-radius:var(--radius-sm);padding:9px 12px;font-family:inherit;font-size:.78rem;color:var(--ink);background:var(--surface);outline:none;transition:all var(--t-fast)}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.form-textarea{resize:vertical;min-height:90px;line-height:1.55}
.check-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:all var(--t-fast)}
.check-row:hover{border-color:var(--line-strong);background:var(--surface-2)}
.check-row.checked{border-color:var(--brand);background:var(--brand-soft)}
.check-row input{accent-color:var(--brand);width:15px;height:15px;flex-shrink:0}
.check-name{font-size:.77rem;font-weight:700;flex:1}
.check-sub{font-size:.64rem;color:var(--ink-3)}
.check-result{font-size:.64rem;font-weight:700;flex-shrink:0}
.wizard-steps{display:flex;gap:6px;margin-bottom:18px}
.wizard-step{flex:1;height:4px;border-radius:20px;background:var(--sunken)}
.wizard-step.on{background:var(--brand)}
.scan-box{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface-2);margin-bottom:8px}
.scan-spinner{width:22px;height:22px;border:2.5px solid var(--line-strong);border-top-color:var(--ai);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.scan-txt{font-size:.74rem;color:var(--ink-2);flex:1}
.progressbar{height:6px;border-radius:20px;background:var(--sunken);overflow:hidden;margin-top:8px}
.progressbar-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--ai),var(--brand));transition:width .4s var(--ease)}

/* ---- TOAST ---- */
#toast-host{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:400;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--ink);color:#fff;font-size:.76rem;font-weight:600;padding:10px 16px;border-radius:var(--radius);box-shadow:var(--shadow-3);display:flex;align-items:center;gap:8px;animation:toast-in .25s var(--ease);max-width:88vw}
.toast .ic{width:14px;height:14px;flex-shrink:0}
.toast.ok .ic{color:#5FF0A8}
.toast.err .ic{color:#FF9B94}
.toast.ai .ic{color:#C9AFF5}
@keyframes toast-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ---- MOBILE ---- */
.tabbar{display:none}
.fab-cervello{display:none}
@media (max-width: 980px){
  .rail{display:none}
  .main{margin-left:0}
  .main.shift{margin-right:0}
  .tb-ask{width:auto;flex:1}
  .tb-ask span{display:none}
  .view{padding:16px 14px 90px}
  .oggi-grid{grid-template-columns:1fr}
  .twin-row{grid-template-columns:repeat(3,1fr)}
  .proj-grid,.prog-grid,.agent-grid{grid-template-columns:1fr}
  .notif-panel{right:10px;left:10px;width:auto}
  .tabbar{display:flex;position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);background:var(--surface);border-top:1px solid var(--line);z-index:210;align-items:center;justify-content:space-around;padding-bottom:env(safe-area-inset-bottom)}
  .tab-item{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--ink-3);padding:6px 10px}
  .tab-item .ic{width:19px;height:19px}
  .tab-item span{font-size:.58rem;font-weight:700}
  .tab-item.active{color:var(--brand)}
  .fab-cervello{display:flex;position:fixed;bottom:76px;right:16px;width:52px;height:52px;border-radius:50%;background:linear-gradient(155deg,var(--ai),var(--ai-2));color:#fff;border:none;align-items:center;justify-content:center;box-shadow:var(--shadow-3);z-index:215}
  .fab-cervello .ic{width:22px;height:22px}
  .cervello{width:100%;border-left:none}
}
</style>
</head>
<body>

<div class="app">

  <nav class="rail" id="rail">
    <div class="rail-mark" title="AppaltanteAI" id="railMark"></div>
    <div class="rail-nav" id="railNav"></div>
    <div class="rail-foot">
      <button class="rail-item" id="railSettings" title="Impostazioni"></button>
      <div class="rail-ava" title="Elena Ferraro — RUP">EF</div>
    </div>
  </nav>

  <div class="main" id="main">
    <header class="topbar">
      <div class="tb-title-wrap">
        <div class="tb-title" id="tbTitle">Oggi</div>
        <div class="tb-sub" id="tbSub">Il tuo contesto di lavoro, non un menu</div>
      </div>
      <div class="tb-spacer"></div>
      <button class="tb-ask" id="tbAsk"></button>
      <div class="tb-acts">
        <button class="tb-btn" id="tbBell" title="Notifiche"></button>
        <button class="tb-cervello-btn" id="tbCervelloBtn"><span class="cervello-pulse"></span>Cervello</button>
      </div>
    </header>

    <div class="notif-panel" id="notifPanel">
      <div class="notif-head">
        <span class="notif-title">Notifiche degli Agenti</span>
        <button class="notif-clear" id="notifClear">Segna tutte come lette</button>
      </div>
      <div class="notif-list" id="notifList"></div>
    </div>

    <div class="alertline" id="alertline">
      <span id="alertlineIco"></span>
      <span id="alertlineTxt">—</span>
      <button class="alertline-link" id="alertlineBtn">Apri</button>
    </div>

    <main class="view" id="view"></main>
  </div>

  <aside class="cervello" id="cervello">
    <div class="cerv-head">
      <div class="cerv-mark" id="cervMark"></div>
      <div>
        <div class="cerv-title">Il Cervello</div>
        <div class="cerv-status"><span class="chip-dot" style="color:var(--ok)"></span> <span id="cervStatusTxt">Sincronizzato</span></div>
      </div>
      <button class="cerv-close" id="cervClose"></button>
    </div>
    <div class="cerv-context" id="cervContext">
      <span id="cervContextIco"></span>
      <div class="cerv-context-txt">Contesto: <b id="cervContextName">Centro Operativo</b></div>

function toast(msg, type){
  const host = document.getElementById('toast-host');
  const el = document.createElement('div');
  el.className = 'toast ' + (type||'');
  const ic = type==='ok'?'check':type==='err'?'x':type==='ai'?'sparkle':'bell';
  el.innerHTML = icon(ic) + '<span>'+msg+'</span>';
  host.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(8px)'; el.style.transition='all .2s'; setTimeout(()=>el.remove(),200); }, 2600);
}
function notify(agenteId, txt){
  D.notifiche.unshift({id:newId('n'), ts:Date.now(), agente:agenteId, txt, letto:false});

  updateBellBadge();
  persist();
}

  const n = D.notifiche.filter(x=>!x.letto).length;

}

/* ---------- MODALE GENERICA ---------- */
let modalOnClose = null;
function openModal(title, bodyHTML, footButtons, opts){
  const scrim = document.getElementById('modalScrim');
  document.getElementById('modalBox').classList.toggle('wide', !!(opts&&opts.wide));
  document.getElementById('modalTitle').innerHTML = title;
  document.getElementById('modalBody').innerHTML = bodyHTML;
  const foot = document.getElementById('modalFoot');
  foot.innerHTML = '';
  (footButtons||[]).forEach(b=>{
    const btn = document.createElement('button');
    btn.className = 'btn ' + (b.cls||'');
    btn.innerHTML = (b.icon?icon(b.icon):'') + b.lbl;
    btn.id = b.id||'';
    if(b.disabled) btn.disabled = true;
    btn.addEventListener('click', b.fn);
    foot.appendChild(btn);
  });
  modalOnClose = (opts&&opts.onClose)||null;
  scrim.classList.add('open');
}
function closeModal(){
  document.getElementById('modalScrim').classList.remove('open');
  if(modalOnClose){ modalOnClose(); modalOnClose = null; }
}

let engineTimer = null;
function startAgentEngine(){
  const tick = ()=>{
    const ids = Object.keys(AGENT_EVENTS);
    const aid = ids[Math.floor(Math.random()*ids.length)];
    const pool = AGENT_EVENTS[aid];
    const txt = pool[Math.floor(Math.random()*pool.length)]();
    const a = agente(aid);
    a.verifiche++;
    agentLog(aid, txt);
    liveEvent(aid, txt);
    if(Math.random()<0.3) notify(aid, `<b>${a.nome}</b> — ${txt}`);
    if(UI.page==='agenti' && !UI.progetto && !UI.programma) render();
    persist();
    engineTimer = setTimeout(tick, 11000 + Math.random()*14000);
  };
  engineTimer = setTimeout(tick, 6000);
}

function runAgentNow(aid){
  const a = agente(aid);
  const card = document.querySelector(`[data-agent-ic="${aid}"]`);
  const dot = document.querySelector(`[data-agent-dot="${aid}"]`);
  if(card) card.classList.add('running');
  if(dot) dot.classList.add('busy');
  toast(a.nome+' in esecuzione…','ai');
  setTimeout(()=>{
    const results = {
      norm:{n:Math.floor(Math.random()*3), txt:'verifiche di conformità completate'},
      rend:{n:Math.floor(Math.random()*2), txt:'controlli di ammissibilità completati'},
      gare:{n:0, txt:'monitoraggio piattaforma completato'},
      doc:{n:Math.floor(Math.random()*4), txt:'documenti riclassificati'},
      risk:{n:Math.floor(Math.random()*2), txt:'scenari di rischio ricalcolati'},
      scad:{n:0, txt:'termini ricontrollati su tutti i progetti'},
      audit:{n:0, txt:'pre-audit del fascicolo campione completato'},
      dec:{n:1, txt:'priorità ricalcolate'},
    };
    const r = results[aid];
    a.verifiche += 1 + r.n;
    const msg = `Esecuzione manuale: ${r.txt}${r.n?` (${r.n} elementi)`:''} — nessuna anomalia critica`;
    agentLog(aid, msg);
    liveEvent(aid, msg);
    notify(aid, `<b>${a.nome}</b> — ${msg}`);
    if(card) card.classList.remove('running');
    if(dot) dot.classList.remove('busy');
    toast(a.nome+': esecuzione completata','ok');
    if(UI.page==='agenti') render();
    persist();
  }, 1800 + Math.random()*1200);
}

function risolviFeed(fid, esito){
  const f = feedItem(fid);
  if(!f || f.stato==='risolto') return;
  const el = document.querySelector(`[data-fcard="${fid}"]`);
  const done = ()=>{
    f.stato = 'risolto';
    f.esito = esito||'Completato';
    const a = agente(f.agente);
    if(a && a.pendenti>0) a.pendenti--;
    persist();
    render();
    updateAlertline();
  };
  if(el){ el.classList.add('resolving'); setTimeout(done, 280); } else done();
}

let uploadTargetProgramma = null;
function apriUploadConoscenza(programmaId){
  uploadTargetProgramma = programmaId||null;
  const sel = programmaId ? '' : `
    <div class="form-row"><label class="form-lbl">Programma di destinazione</label>
      <select class="form-select" id="upProg">${D.programmi.map(pr=>`<option value="${pr.id}">${pr.sigla} — ${pr.nome}</option>`).join('')}</select>
    </div>`;
  openModal('Aggiorna il Cervello — carica nuova conoscenza', `
    ${sel}
    <div class="dropzone" id="kDrop">
      ${icon('upload')}
      <div class="dz-title">Trascina qui manuali, circolari, linee guida, FAQ</div>
      <div class="dz-sub">PDF, DOCX, TXT, MD, XLSX — il Cervello li interpreta, li segmenta e ne estrae le regole</div>
    </div>
    <p style="font-size:.68rem;color:var(--ink-3)">Ogni documento caricato diventa conoscenza interrogabile: gli agenti la useranno da subito nei loro controlli, e tutti i progetti del programma la erediteranno automaticamente.</p>
  `, [{lbl:'Chiudi', fn:closeModal}]);
  const drop = document.getElementById('kDrop');
  const fi = document.getElementById('fileInput');
  const handleFiles = files=>{
    const progId = uploadTargetProgramma || document.getElementById('upProg').value;
    closeModal();
    Array.from(files).forEach((file,i)=>setTimeout(()=>ingestDocument(progId, file), i*600));
    if(!files.length){ ingestDocument(progId, null); }
  };
  drop.addEventListener('click', ()=>{ fi.value=''; fi.onchange = ()=>handleFiles(fi.files); fi.click(); });
  drop.addEventListener('dragover', e=>{e.preventDefault();drop.classList.add('over');});
  drop.addEventListener('dragleave', ()=>drop.classList.remove('over'));
  drop.addEventListener('drop', e=>{ e.preventDefault(); handleFiles(e.dataTransfer.files); });
}

function guessTipo(nome){
  const n = nome.toLowerCase();
  if(n.includes('manuale')) return 'Manuale operativo';
  if(n.includes('circolare')) return 'Circolare';
  if(n.includes('faq')) return 'FAQ';
  if(n.includes('linee')||n.includes('guida')) return 'Linee guida';
  if(n.includes('bando')) return 'Bando';
  if(n.includes('delibera')) return 'Delibera';
  if(n.includes('decreto')) return 'Decreto';
  if(n.includes('template')||n.includes('modello')) return 'Template';
  return 'Documento di programma';
}

function ingestDocument(progId, file){
  const nome = file ? file.name.replace(/\.[^.]+$/,'') : 'Documento di esempio '+(Math.floor(Math.random()*90)+10);
  const sizeKb = file ? Math.max(1, Math.round(file.size/1024)) : 300;
  const doc = {id:newId('k'), nome, tipo:guessTipo(nome), step:1, regole:0, nuovo:true};
  if(!D.kdocs[progId]) D.kdocs[progId] = [];
  D.kdocs[progId].unshift(doc);
  if(UI.programma!==progId){ openProgramma(progId); } else render();
  toast('"'+nome.slice(0,36)+'" ricevuto — ingestione avviata','ai');
  agentLog('doc','Avviata ingestione di "'+nome.slice(0,40)+'" nel programma '+prog(progId).sigla);

  const stepNames = ['Caricato','Segmentato','Regole estratte','Collegato al grafo'];
  let s = 1;
  const iv = setInterval(()=>{
    s++;
    doc.step = s;
    if(s===3){
      doc.regole = Math.max(4, Math.min(160, Math.round(sizeKb/14) + Math.floor(Math.random()*12)));
      prog(progId).regole += doc.regole;
    }
    if(UI.programma===progId) render();
    if(s>=4){
      clearInterval(iv);
      doc.nuovo = false;
      const pr = prog(progId);
      agentLog('doc','Completata ingestione di "'+nome.slice(0,40)+'": '+doc.regole+' regole estratte e collegate');
      liveEvent('doc','"'+nome.slice(0,32)+'" indicizzato: +'+doc.regole+' regole per '+pr.sigla);
      notify('doc','<b>Agente Documentale</b> ha indicizzato "<b>'+esc(nome.slice(0,40))+'</b>": '+doc.regole+' regole estratte, ora attive per tutti i progetti '+pr.sigla);
      cervSystemMsg('Ho letto e indicizzato "'+nome.slice(0,44)+'". Ho estratto '+doc.regole+' regole operative: i progetti '+pr.sigla+' le ereditano da subito e gli agenti le stanno già applicando nei controlli.');
      toast('"'+nome.slice(0,30)+'" indicizzato: +'+doc.regole+' regole','ok');
      setTimeout(()=>{
        agentLog('norm','Rieseguiti i controlli di conformità con le nuove regole di "'+nome.slice(0,34)+'": nessun nuovo scostamento');
        liveEvent('norm','Controlli rieseguiti con la nuova conoscenza: tutto conforme');
        if(UI.page==='agenti') render();
        persist();
      }, 4000);
      persist();
      if(UI.programma===progId) render();
    }
  }, 1400);
}

  const c = val>=80?'var(--ok)':val>=55?'var(--warn)':'var(--crit)';

}

  return `<span class="chip chip-warn">${icon('clock')} In verifica</span>`;
}

function caricaDocFascicolo(pid, docId){
  const p = proj(pid);
  openModal('Carica documento nel fascicolo', `
    <div class="dropzone" id="fascDrop">${icon('upload')}<div class="dz-title">Trascina qui il documento, o clicca per selezionarlo</div><div class="dz-sub">L\u2019Agente Documentale lo classificherà e collegherà automaticamente</div></div>
    <div id="fascScan"></div>
  `, [{lbl:'Annulla', fn:closeModal}]);
  const drop = document.getElementById('fascDrop');
  const fi = document.getElementById('fileInput');
  const handle = (files)=>{
    const nome = files && files[0] ? files[0].name.replace(/\.[^.]+$/,'') : 'Documento caricato';
    drop.style.display = 'none';
    document.getElementById('fascScan').innerHTML = `<div class="scan-box"><div class="scan-spinner"></div><div class="scan-txt"><b>${esc(nome)}</b><br><span style="color:var(--ink-3);font-size:.68rem">Classificazione automatica in corso…</span></div></div>`;
    setTimeout(()=>{
      closeModal();
      if(docId){
        const d = (D.docs[pid]||[]).find(x=>x.id===docId);
        if(d) d.stato='ok';
      } else {
        if(!D.docs[pid]) D.docs[pid]=[];
        D.docs[pid].push({id:newId('d'), nome, tipo:'Allegato', stato:'ok'});
      }
      p.doc = Math.min(100, p.doc+6);
      agentLog('doc','Classificato e collegato "'+nome.slice(0,36)+'" al fascicolo di "'+p.titolo.slice(0,26)+'…"');
      liveEvent('doc','"'+nome.slice(0,30)+'" collegato al fascicolo');
      toast('Documento classificato e collegato al fascicolo','ok');
      UI.projTab='documenti'; render(); persist();
    }, 1900);
  };
  drop.addEventListener('click', ()=>{ fi.value=''; fi.onchange=()=>handle(fi.files); fi.click(); });
  drop.addEventListener('dragover', e=>{e.preventDefault();drop.classList.add('over');});
  drop.addEventListener('dragleave', ()=>drop.classList.remove('over'));
  drop.addEventListener('drop', e=>{e.preventDefault();handle(e.dataTransfer.files);});
}

function updateAlertline(){
  const el = document.getElementById('alertline');
  const worst = D.progetti.filter(p=>p.rischio==='alto').sort((a,b)=>a.scadenzaGiorni-b.scadenzaGiorni)[0];
  if(worst && worst.scadenzaGiorni<=5){
    el.classList.add('show');
    document.getElementById('alertlineIco').innerHTML = icon('alert');
    document.getElementById('alertlineTxt').innerHTML = `<b>${worst.titolo.slice(0,52)}${worst.titolo.length>52?'…':''}</b> — rischio alto con scadenza tra ${worst.scadenzaGiorni} giorni.`;
    const btn = document.getElementById('alertlineBtn');
    btn.onclick = ()=>openProgetto(worst.id);
  } else {
    el.classList.remove('show');
  }
}

/* ════════════════════════════════════════════════════════════════
   IL CERVELLO
   ════════════════════════════════════════════════════════════════ */
const CERV_SUGGESTIONS = [
  'Cosa devo fare oggi con priorità?',
  'Perché il progetto Rodari è a rischio?',
  'Che regole hai imparato dagli ultimi documenti?',
  'Genera la determina di liquidazione',
  'Ci sono clausole non conformi in corso?',
];
function setCervContext(name){
  UI.cervContext = name;
  const el = document.getElementById('cervContextName');
  if(el) el.textContent = name;
}
function openCervello(){
  UI.cervelloOpen = true;
  document.getElementById('cervello').classList.add('open');
  document.getElementById('main').classList.add('shift');
  document.getElementById('tbCervelloBtn').classList.add('on');
  if(window.innerWidth<=980) document.getElementById('cervelloScrim').classList.add('show');
  renderCervThread();
  setTimeout(()=>document.getElementById('cervInput')?.focus(), 200);
}
function closeCervello(){
  UI.cervelloOpen = false;
  document.getElementById('cervello').classList.remove('open');
  document.getElementById('main').classList.remove('shift');
  document.getElementById('tbCervelloBtn').classList.remove('on');
  document.getElementById('cervelloScrim').classList.remove('show');
}
function toggleCervello(){ UI.cervelloOpen ? closeCervello() : openCervello(); }

function renderCervThread(){
  const t = document.getElementById('cervThread');
  t.innerHTML = D.cervHistory.map(m=>`
    <div class="cmsg ${m.role==='ai'?'cmsg-ai':'cmsg-user'}">
      <div class="cmsg-ava ${m.role==='ai'?'ai':'user'}">${m.role==='ai'?icon('brain'):'EF'}</div>
      <div class="cmsg-bubble">
        ${m.text.split('\n').map(p=>`<p>${p}</p>`).join('')}
        ${m.cite?`<div class="cmsg-cites"><span class="cite-chip">${icon('file')} ${m.cite}</span></div>`:''}
      </div>
    </div>`).join('');
  const sug = document.getElementById('cervSuggestRow');
  sug.innerHTML = CERV_SUGGESTIONS.map(s=>`<button class="cerv-sugg-btn" data-sugg="${esc(s)}">${s}</button>`).join('');
  sug.querySelectorAll('[data-sugg]').forEach(b=>b.addEventListener('click', ()=>sendCervello(b.dataset.sugg)));
  t.scrollTop = t.scrollHeight;
}

function cervSystemMsg(text){
  D.cervHistory.push({role:'ai', text});
  if(UI.cervelloOpen) renderCervThread();
  persist();
}

function cervReply(question){
  const q = question.toLowerCase();
  if(q.includes('rodari') || q.includes('rischio')){
    const p = proj('p2');
    return {text:'Il progetto "Riqualificazione energetica scuola Rodari" è a rischio '+p.rischio+'. '+(p.rischio==='alto'?'Il SAL 2 non è ancora stato caricato e l\u2019art.14 del disciplinare non è allineato al correttivo 2025.':'Ho già applicato le correzioni: il SAL è stato regolarizzato e la clausola aggiornata.')+' Ti consiglio di monitorare la milestone di luglio nei prossimi giorni.', cite:'Fonte: Pista di controllo FESR §3.2 — D.Lgs. 36/2023 art. 119'};
  }
  if(q.includes('oggi') || q.includes('priorità')){
    const aperti = D.feed.filter(f=>f.stato==='aperto').slice(0,3);
    if(!aperti.length) return {text:'Non ci sono azioni urgenti al momento: tutto è sotto controllo. Continuo a monitorare rischi e scadenze in background.', cite:null};
    return {text:'Le priorità di oggi, in ordine di impatto:\n'+aperti.map((f,i)=>(i+1)+'. '+f.titolo).join('\n'), cite:null};
  }
  if(q.includes('regole') || q.includes('imparato') || q.includes('documenti')){
    const ultimi = Object.entries(D.kdocs).flatMap(([pid,docs])=>docs.map(d=>({...d,prog:pid}))).sort((a,b)=>0).slice(-3);
    const totRegole = D.programmi.reduce((s,p)=>s+p.regole,0);
    return {text:'Ho indicizzato in totale '+totRegole+' regole operative su '+D.programmi.length+' programmi. Le più recenti derivano dagli ultimi documenti caricati: le sto già applicando nei controlli automatici degli agenti.', cite:null};
  }
  if(q.includes('determina') || q.includes('liquidazione')){
    return {text:'Ho preparato la bozza della determina di liquidazione per il SAL 1 di "Cooperazione transfrontaliera turismo lento", usando il template Interreg e i giustificativi già verificati come ammissibili. La trovi tra le automazioni proposte nella pagina Oggi, pronta per la tua firma.', cite:'Fonte: Programme Manual Interreg IT-CH, allegato 6'};
  }
  if(q.includes('clausol') || q.includes('conform')){
    const aperte = D.feed.filter(f=>f.stato==='aperto' && f.agente==='norm');
    if(!aperte.length) return {text:'Al momento non ho non conformità aperte sui 7 progetti attivi: tutte le clausole sono allineate al D.Lgs. 36/2023 e ai correttivi vigenti.', cite:null};
    return {text:'Ho trovato una non conformità attiva: nel disciplinare di "Rodari" la soglia di subappalto all\u2019art.14 cita il testo pre-correttivo. Nessun\u2019altra clausola risulta disallineata sui progetti attivi.', cite:'Fonte: D.Lgs. 36/2023, correttivo 2025 — art. 119'};
  }
  return {text:'Ho verificato il contesto disponibile: al momento non ho un riscontro diretto su questo, ma posso incrociare normativa, manuali di programma e lo stato dei tuoi progetti se mi dai qualche dettaglio in più — ad esempio il nome del progetto o il programma di riferimento.', cite:null};
}

function sendCervello(text){
  const val = (text||'').trim();
  if(!val) return;
  D.cervHistory.push({role:'user', text:val});
  renderCervThread();
  const t = document.getElementById('cervThread');
  const typingEl = document.createElement('div');
  typingEl.className = 'cmsg cmsg-ai';
  typingEl.innerHTML = `<div class="cmsg-ava ai">${icon('brain')}</div><div class="cmsg-bubble cerv-typing"><span></span><span></span><span></span></div>`;
  t.appendChild(typingEl);
  t.scrollTop = t.scrollHeight;
  setTimeout(()=>{
    const r = cervReply(val);
    D.cervHistory.push({role:'ai', text:r.text, cite:r.cite});
    renderCervThread();
    persist();
  }, 850);
}

/* ════════════════════════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════════════════════════ */
function buildRailNav(){
  const el = document.getElementById('railNav');
  el.innerHTML = NAV_ITEMS.map(it => `
    <button class="rail-item" data-page="${it.id}" title="${it.label}">
      ${icon(it.icon)}<span>${it.label}</span>
    </button>`).join('');
  el.querySelectorAll('.rail-item').forEach(b => b.addEventListener('click', () => nav(b.dataset.page)));
  document.getElementById('railSettings').innerHTML = icon('settings');
  document.getElementById('railSettings').addEventListener('click', () => toast('Impostazioni — in arrivo','info'));
  document.getElementById('railMark').innerHTML = icon('brain');
}
function buildTabbar(){
  const el = document.getElementById('tabbar');
  el.innerHTML = NAV_ITEMS.slice(0,5).map(it => `
    <button class="tab-item" data-page="${it.id}">${icon(it.icon)}<span>${it.label}</span></button>`).join('');
  el.querySelectorAll('.tab-item').forEach(b => b.addEventListener('click', () => nav(b.dataset.page)));
}

document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('tbAsk').innerHTML = `${icon('search')}<span>Chiedi al Cervello…</span><kbd>⌘K</kbd>`;
  document.getElementById('tbBell').innerHTML = `${icon('bell')}<span class="tb-badge" id="bellBadge">0</span>`;
  document.getElementById('cervMark').innerHTML = icon('brain');
  document.getElementById('cervClose').innerHTML = icon('x');
  document.getElementById('cervSend').innerHTML = icon('send');
  document.getElementById('cervContextIco').innerHTML = icon('folder');
  document.getElementById('modalX').innerHTML = icon('x');
  document.getElementById('fabCervello').innerHTML = icon('brain');

  const saved = await Store.load();
  if(saved){ D = saved; toast('Sessione precedente ripristinata','ok'); }

  buildRailNav();
  buildTabbar();
  nav('oggi');
  updateBellBadge();
  updateAlertline();
  startAgentEngine();

  document.getElementById('tbCervelloBtn').addEventListener('click', toggleCervello);
  document.getElementById('tbAsk').addEventListener('click', openCervello);
  document.getElementById('cervClose').addEventListener('click', closeCervello);
  document.getElementById('cervelloScrim').addEventListener('click', closeCervello);
  document.getElementById('fabCervello').addEventListener('click', openCervello);
  document.getElementById('tbBell').addEventListener('click', (e)=>{ e.stopPropagation(); toggleNotif(); });
  document.getElementById('notifClear').addEventListener('click', markAllRead);
  document.addEventListener('click', (e)=>{
    const panel = document.getElementById('notifPanel');
    if(panel.classList.contains('open') && !panel.contains(e.target) && e.target.id!=='tbBell' && !e.target.closest('#tbBell')) closeNotif();
  });
  document.getElementById('modalX').addEventListener('click', closeModal);
  document.getElementById('modalScrim').addEventListener('click', (e)=>{ if(e.target.id==='modalScrim') closeModal(); });

  const input = document.getElementById('cervInput');
  document.getElementById('cervSend').addEventListener('click', ()=>{ sendCervello(input.value); input.value=''; input.style.height='auto'; });
  input.addEventListener('keydown', (e)=>{
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendCervello(input.value); input.value=''; input.style.height='auto'; }
  });
  input.addEventListener('input', ()=>{ input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,90)+'px'; });

  document.addEventListener('keydown', (e)=>{
    if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); openCervello(); }
    if(e.key==='Escape'){ if(UI.cervelloOpen) closeCervello(); closeNotif(); closeModal(); }
  });

  setTimeout(()=>toast('Cervello sincronizzato — '+D.programmi.reduce((s,p)=>s+p.regole,0)+' regole attive','ok'), 600);
});
</script>
